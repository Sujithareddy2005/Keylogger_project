<!DOCTYPE html>
<html>
<head>
    <title>Keylogger App (Educational)</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 50px;
        }
        textarea {
            width: 300px;
            height: 100px;
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            width: 60%;
            margin: auto;
        }
    </style>
</head>
<body>

<h2>⌨️ Keylogger (Educational Demo)</h2>

<form method="POST">
    <textarea name="text" placeholder="Type something..."></textarea><br>
    <button type="submit">Log Input</button>
</form>

<h3>Last Input:</h3>
<p>{{ logged_text }}</p>

<h3>Logs:</h3>
<pre>{{ logs }}</pre>

<form action="/clear" method="POST">
    <button type="submit">Clear Logs</button>
</form>

</body>
</html>
